<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мега-Лабиринт: 50 Уровней и Охранники</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-neon: #66fcf1;
            --text-color: #fff;
            --success: #2ecc71;
            --danger: #ff4d4d;
            --xp-color: #9b59b6;
            --gem-color: #00d2d3;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; user-select: none;
        }

        .screen {
            display: none; flex-direction: column; align-items: center;
            width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box;
            height: 100vh; overflow-y: auto;
        }
        .screen.active { display: flex; }

        h1 {
            color: var(--accent-neon); text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3); text-align: center; margin-bottom: 15px;
            font-size: 26px; margin-top: 5px;
        }

        .profile-panel {
            background: var(--card-bg); width: 100%; padding: 12px; 
            border-radius: 12px; margin-bottom: 15px; box-sizing: border-box;
            border: 1px solid rgba(102, 252, 241, 0.2);
        }
        .profile-stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold;}
        .xp-bar-bg { background: #111; width: 100%; height: 10px; border-radius: 5px; overflow: hidden; }
        .xp-bar-fill { background: var(--xp-color); height: 100%; width: 0%; transition: width 0.3s; }

        .skin-selector { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
        .skin-btn {
            flex: 1; background: #121212; border: 2px solid #333; color: #fff;
            padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.2s;
        }
        .skin-btn.selected { border-color: var(--accent-neon); background: var(--card-bg); }
        .skin-preview { width: 40px; height: 40px; }

        .menu-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .btn-ui {
            background: var(--card-bg); color: var(--text-color); border: 2px solid var(--accent-neon);
            padding: 12px; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: all 0.2s; text-align: center; text-decoration: none;
        }
        .btn-ui:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        .btn-ui:not(:disabled):active { background: var(--accent-neon); color: var(--bg-color); box-shadow: 0 0 15px var(--accent-neon); }
        
        .btn-continue { border-color: var(--success); color: var(--success); }
        .btn-continue:not(:disabled):active { background: var(--success); color: #fff; box-shadow: 0 0 15px var(--success); }

        .stats-bar {
            display: grid; grid-template-columns: repeat(3, 1fr);
            width: 100%; margin-bottom: 10px; font-weight: bold; font-size: 11px; text-align: center;
            background: var(--card-bg); padding: 8px; border-radius: 8px; box-sizing: border-box; gap: 5px;
        }

        #canvasContainer { position: relative; width: 360px; height: 360px; }
        #gameCanvas { border: 3px solid var(--accent-neon); background-color: #121212; width: 100%; height: 100%; }
        
        /* Эффект темноты в туннеле */
        #tunnelVision {
            position: absolute; top: 3px; left: 3px; width: 360px; height: 360px;
            pointer-events: none; border-radius: 2px; display: none;
            background: radial-gradient(circle 55px at 50% 50%, transparent 20%, rgba(0,0,0,0.95) 75%);
            transition: background 0.1s ease;
        }

        .controls {
            display: grid; grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px); gap: 10px; margin-top: 10px;
        }
        .joy-btn {
            background: var(--card-bg); color: var(--accent-neon); border: 1px solid var(--accent-neon);
            border-radius: 12px; font-size: 22px; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .joy-btn:active { background: #2f3e46; }
        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }

        .shop-container { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .shop-section { background: #121212; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .shop-section h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--accent-neon); text-transform: uppercase; }
        .shop-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .shop-item-btn {
            background: var(--card-bg); border: 1px solid #444; color: white; padding: 8px;
            border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-align: center;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 55px;
        }
        .shop-item-btn.equipped { border: 1px solid var(--success); background: rgba(46, 204, 113, 0.1); }
        .shop-item-btn.unlocked { border: 1px solid var(--xp-color); }
        .shop-item-btn .price { color: var(--gem-color); margin-top: 4px; font-size: 10px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 10;
        }
        .modal-content {
            background: var(--card-bg); padding: 25px; border-radius: 15px;
            text-align: center; border: 2px solid var(--success); max-width: 300px;
        }
        .code-box {
            background: #000; padding: 10px; margin: 15px 0; border: 2px dashed var(--success);
            color: var(--success); font-family: monospace; font-size: 20px; font-weight: bold;
        }
        
        .quest-card { background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .reward { color: var(--gem-color); font-weight: bold; margin: 5px 0; }
        .q-btns { display: flex; gap: 10px; margin-top: 10px; }
        .q-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
        .q-go { background: var(--accent-neon); color: #000; }
        .q-check { background: var(--success); color: #fff; }
        .q-check:disabled { background: #444; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="screen active" id="screenMenu">
        <h1>Лабиринт</h1>
        
        <div class="profile-panel">
            <div class="profile-stats">
                <span style="color: var(--danger);" id="menuLives">❤️ Жизни: 5/5</span>
                <span style="color: var(--gem-color);" id="menuGems">💎 0</span>
            </div>
            <div style="font-size: 11px; text-align: left; color: #ff4d4d; margin-bottom: 5px;" id="regenTimer">Регенерация: Полна</div>
            <div class="profile-stats">
                <span style="color: var(--accent-neon);" id="menuAccLevel">Уровень: 1</span>
            </div>
            <div class="xp-bar-bg"><div class="xp-bar-fill" id="menuXpFill"></div></div>
            <div style="font-size: 11px; text-align: right; color: #aaa; margin-top: 4px;" id="menuXpText">0 / 100 XP</div>
        </div>

        <div style="font-size: 14px; font-weight: bold; margin-bottom: 8px; width: 100%; text-align: left; color: #a9b7c6;">Выберите героя:</div>
        <div class="skin-selector">
            <button class="skin-btn selected" id="skinMaleBtn" onclick="setGender('male')">
                <canvas id="preMale" class="skin-preview" width="40" height="40"></canvas>
                <span>Парень</span>
            </button>
            <button class="skin-btn" id="skinFemaleBtn" onclick="setGender('female')">
                <canvas id="preFemale" class="skin-preview" width="40" height="40"></canvas>
                <span>Девушка</span>
            </button>
        </div>

        <div class="menu-buttons">
            <button class="btn-ui btn-continue" id="btnContinueGame" style="display: none;" onclick="playClick(); resumeGame()">Продолжить (Ур. <span id="continueLvlNum">1</span>)</button>
            <button class="btn-ui" id="btnStartGame" onclick="playClick(); startNewGame()">Новая игра</button>
            <button class="btn-ui" onclick="playClick(); switchScreen('screenShop')">👕 Гардероб и Магазин</button>
            <button class="btn-ui" onclick="playClick(); switchScreen('screenQuests')">Квесты</button>
        </div>
    </div>

    <div class="screen" id="screenGame">
        <div class="stats-bar">
            <span id="levelIndicator" style="color: var(--accent-neon);">Ур: 1/50</span>
            <span id="gameLives" style="color: var(--danger);">❤️ 5</span>
            <span id="timerIndicator">⏱ 30с</span>
            <span id="stepsIndicator" style="display:none">👣 0</span>
            <span id="keyIndicator" style="color: var(--danger); grid-column: span 3;">Ключ: ❌</span>
        </div>
        <div id="gameStatus" style="margin-bottom: 10px; font-size: 12px; text-align: center; min-height: 20px;">Найди КЛЮЧ (🔑) и беги от охранников!</div>
        
        <div id="canvasContainer">
            <canvas id="gameCanvas" width="360" height="360"></canvas>
            <div id="tunnelVision"></div>
        </div>
        
        <div class="controls">
            <button class="joy-btn" id="up" onclick="movePlayer(0, -1)">↑</button>
            <button class="joy-btn" id="left" onclick="movePlayer(-1, 0)">←</button>
            <button class="joy-btn" id="down" onclick="movePlayer(0, 1)">↓</button>
            <button class="joy-btn" id="right" onclick="movePlayer(1, 0)">→</button>
        </div>
        <button class="btn-ui" style="margin-top: 10px; width: 100%; padding: 6px; font-size: 13px;" onclick="playClick(); exitToMenu()">В меню</button>
    </div>

    <div class="screen" id="screenShop">
        <h1>Гардероб</h1>
        <div class="profile-panel" style="margin-bottom: 10px;">
            <div style="display: flex; justify-content: space-between; font-weight: bold;">
                <span>Баланс:</span>
                <span style="color: var(--gem-color);" id="shopGems">💎 0</span>
            </div>
        </div>

        <div class="shop-container" id="shopContainer"></div>

        <button class="btn-ui" style="width: 100%; padding: 10px;" onclick="playClick(); switchScreen('screenMenu')">Назад в меню</button>
    </div>

    <div class="screen" id="screenQuests">
        <h1>Квесты</h1>
        <div class="quest-list">
            <div class="quest-card">
                <h3>Подписка на Telegram</h3>
                <p>Подпишись на наш игровой ТГ-канал.</p>
                <div class="reward">+100 Алмазов в игре</div>
                <div class="q-btns">
                    <a href="https://t.me/your_tg_channel" target="_blank" class="q-btn q-go" onclick="playClick(); enableCheckBtn(1)">Перейти</a>
                    <button class="q-btn q-check" id="qcheck1" disabled onclick="playClick(); addGems(100); showRewardModal('TG-GEMS-99')">Проверить</button>
                </div>
            </div>
        </div>
        <button class="btn-ui" style="margin-top: 30px; width: 100%; padding: 10px;" onclick="playClick(); switchScreen('screenMenu')">Назад в меню</button>
    </div>

    <div class="modal" id="rewardModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--success); margin: 0;">Успех!</h2>
            <p id="modalText"></p>
            <div class="code-box" id="codeBox">XXXX-XXXX</div>
            <button class="btn-ui" style="padding: 10px; width: 100%;" id="modalBtn" onclick="playClick(); closeModal()">Отлично</button>
        </div>
    </div>

    <script>
        // --- ПРОФИЛЬ, РАСШИРЕННЫЕ СКИНЫ И ЖИЗНИ ---
        let playerData = {
            gender: 'male', gems: 0, level: 1, xp: 0,
            currentSavedLevel: 1,
            lives: 5,
            lastLifeLossTime: null, // Время последней потери жизни
            equipped: { hat: 0, glasses: 0, shirt: 0 },
            unlocked: { hat: [0], glasses: [0], shirt: [0] }
        };

        const customizationItems = {
            hat: [
                { id: 0, name: "Без убора", color: "transparent" },
                { id: 1, name: "Кепка", color: "#e74c3c" },
                { id: 2, name: "Бандана", color: "#f1c40f" },
                { id: 3, name: "Шапка", color: "#34495e" },
                { id: 4, name: "Корона VIP", color: "#f39c12" },
                { id: 5, name: "Шлем хакера", color: "#2c3e50" }
            ],
            glasses: [
                { id: 0, name: "Обычные", color: "#000000" },
                { id: 1, name: "Круглые", color: "#7f8c8d" },
                { id: 2, name: "Авиаторы", color: "#f39c12" },
                { id: 3, name: "Без очков", color: "transparent" },
                { id: 4, name: "Маска киборга", color: "#00d2d3" },
                { id: 5, name: "Очки агента", color: "#222" }
            ],
            shirt: [
                { id: 0, name: "Обычная", color: "default" },
                { id: 1, name: "Худи", color: "#27ae60" },
                { id: 2, name: "VIP Жилет", color: "#f1c40f" },
                { id: 3, name: "Кибер кофта", color: "#e84393" },
                { id: 4, name: "Плащ ниндзя", color: "#111" },
                { id: 5, name: "Костюм Амогуса", color: "#d63031" }
            ]
        };

        // --- СИСТЕМА ВОССТАНОВЛЕНИЯ ЖИЗНЕЙ (3 МИНУТЫ) ---
        const LIFE_REGEN_MS = 3 * 60 * 1000; // 3 минуты в миллисекундах

        function checkLifeRegen() {
            if (playerData.lives >= 5) {
                document.getElementById('regenTimer').innerText = "Регенерация: Полна";
                return;
            }
            if (!playerData.lastLifeLossTime) return;

            let now = Date.now();
            let elapsed = now - playerData.lastLifeLossTime;

            if (elapsed >= LIFE_REGEN_MS) {
                let livesToGain = Math.floor(elapsed / LIFE_REGEN_MS);
                playerData.lives = Math.min(5, playerData.lives + livesToGain);
                
                if (playerData.lives >= 5) {
                    playerData.lastLifeLossTime = null;
                } else {
                    playerData.lastLifeLossTime = playerData.lastLifeLossTime + (livesToGain * LIFE_REGEN_MS);
                }
                saveProfile();
            } else {
                let remaining = LIFE_REGEN_MS - elapsed;
                let min = Math.floor(remaining / 60000);
                let sec = Math.floor((remaining % 60000) / 1000);
                document.getElementById('regenTimer').innerText = `❤️ +1 через: ${min}:${sec < 10 ? '0' : ''}${sec}`;
            }
        }

        setInterval(checkLifeRegen, 1000);

        function loadProfile() {
            const saved = localStorage.getItem('maze_runner_profile_v50');
            if (saved) {
                let parsed = JSON.parse(saved);
                playerData = { ...playerData, ...parsed };
            }
            updateProfileUI();
        }

        function saveProfile() {
            localStorage.setItem('maze_runner_profile_v50', JSON.stringify(playerData));
            updateProfileUI();
        }

        function updateProfileUI() {
            document.getElementById('menuAccLevel').innerText = `Уровень аккаунта: ${playerData.level}`;
            document.getElementById('menuGems').innerText = `💎 ${playerData.gems}`;
            document.getElementById('shopGems').innerText = `💎 ${playerData.gems}`;
            document.getElementById('menuLives').innerText = `❤️ Жизни: ${playerData.lives}/5`;
            
            let xpNeeded = playerData.level * 100;
            let fillPct = (playerData.xp / xpNeeded) * 100;
            document.getElementById('menuXpFill').style.width = `${fillPct}%`;
            document.getElementById('menuXpText').innerText = `${playerData.xp} / ${xpNeeded} XP`;

            const contBtn = document.getElementById('btnContinueGame');
            const startBtn = document.getElementById('btnStartGame');
            
            if (playerData.lives <= 0) {
                contBtn.setAttribute('disabled', 'true');
                startBtn.setAttribute('disabled', 'true');
            } else {
                contBtn.removeAttribute('disabled');
                startBtn.removeAttribute('disabled');
            }

            if (playerData.currentSavedLevel > 1 && playerData.currentSavedLevel <= 50) {
                contBtn.style.display = "block";
                document.getElementById('continueLvlNum').innerText = playerData.currentSavedLevel;
                startBtn.innerText = "Новая игра (Сброс)";
            } else {
                contBtn.style.display = "none";
                startBtn.innerText = "Играть";
            }
            renderMenuPreviews();
        }

        function addGems(amount) { playerData.gems += amount; saveProfile(); }
        function setGender(g) { playerData.gender = g; playClick(); saveProfile(); }

        // --- МАГАЗИН ---
        function renderShop() {
            const container = document.getElementById('shopContainer'); container.innerHTML = "";
            const categories = [
                { type: 'hat', title: '🧢 Головные уборы (250 💎)' },
                { type: 'glasses', title: '👓 Очки и аксессуары (250 💎)' },
                { type: 'shirt', title: '👕 Одежда (250 💎)' }
            ];
            categories.forEach(cat => {
                let section = document.createElement('div'); section.className = 'shop-section';
                section.innerHTML = `<h3>${cat.title}</h3>`;
                let itemsGrid = document.createElement('div'); itemsGrid.className = 'shop-items';
